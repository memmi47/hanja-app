<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="light dark">
<title>한자 학습</title>
<style>
  :root{
    --bg:#FDFBF7; --card:#FFFFFF; --ink:#2B2926; --muted:#8A8378; --line:#E5E0D5;
    --accent:#0F6E56; --accent-text:#FFFFFF; --star:#BA7517;
    --good:#1F8A50; --good-bg:#E9FBEF; --bad:#C43A3A; --bad-bg:#FFEFEF;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1C1B19; --card:#242220; --ink:#EDEAE3; --muted:#9A9488; --line:#3A3733;
      --accent:#1D9E75; --accent-text:#04342C; --star:#E0A83E;
      --good:#3ECF8E; --good-bg:#12301F; --bad:#FF6B6B; --bad-bg:#361616;
    }
  }
  /* 자동(시스템) 판단과 별개로, 사용자가 명시적으로 고른 테마는 이 클래스가 항상 이긴다 */
  html.theme-light{
    --bg:#FDFBF7; --card:#FFFFFF; --ink:#2B2926; --muted:#8A8378; --line:#E5E0D5;
    --accent:#0F6E56; --accent-text:#FFFFFF; --star:#BA7517;
    --good:#1F8A50; --good-bg:#E9FBEF; --bad:#C43A3A; --bad-bg:#FFEFEF;
  }
  html.theme-dark{
    --bg:#1C1B19; --card:#242220; --ink:#EDEAE3; --muted:#9A9488; --line:#3A3733;
    --accent:#1D9E75; --accent-text:#04342C; --star:#E0A83E;
    --good:#3ECF8E; --good-bg:#12301F; --bad:#FF6B6B; --bad-bg:#361616;
  }
  .theme-toggle{
    position:fixed; top:10px; right:10px; z-index:60;
    width:28px; height:28px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding:16px 16px 50px;
  }
  .hidden{display:none !important;}
  .screen{width:100%; max-width:480px;}

  /* ===== 진입(표지) 화면 ===== */
  #screen-entry{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:80vh; text-align:center;
  }
  .cover-glyph{font-size:64px; font-weight:500; line-height:1; margin-bottom:8px;}
  .cover-title{font-size:16px; font-weight:800; margin-bottom:4px;}
  .cover-tagline{font-size:13px; color:var(--muted); margin-bottom:28px;}
  .cover-progress{
    width:100%; max-width:280px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:14px 16px; margin-bottom:18px;
  }
  .cover-progress-row{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px;}
  .cover-progress-track{height:7px; background:var(--line); border-radius:4px; overflow:hidden;}
  .cover-progress-fill{height:100%; background:var(--accent); border-radius:4px;}
  .btn-continue{
    width:100%; max-width:280px; padding:15px; border-radius:14px; border:none;
    background:var(--accent); color:var(--accent-text); font-size:16px; font-weight:800; cursor:pointer;
  }
  .btn-continue-sub{font-size:12px; color:var(--muted); margin-top:12px; margin-bottom:20px; cursor:pointer; text-decoration:underline; text-underline-offset:3px;}

  .module-card{
    width:100%; max-width:280px; padding:18px 20px; border-radius:16px; border:1px solid var(--line);
    background:var(--card); cursor:pointer; text-align:center; color:var(--ink); font-family:inherit;
    margin-bottom:12px;
  }
  .module-card-title{font-size:16px; font-weight:800; margin-bottom:10px;}
  .module-card-sub{font-size:12px; color:var(--muted); margin-bottom:10px;}
  .module-card-cta{margin-top:12px; font-size:14px; font-weight:800; color:var(--accent);}
  .module-card-g5 .module-card-title{color:var(--star);}
  .module-card-g5 .module-card-cta{color:var(--star);}
  .module-card-g5 .cover-progress-fill{background:var(--star);}

  /* ===== 학습 화면 헤더 ===== */
  .back-link{align-self:flex-start; font-size:13px; color:var(--muted); cursor:pointer; margin-bottom:10px; padding:4px 0;}
  .vol-nav{display:flex; align-items:center; justify-content:center; gap:6px; width:100%; max-width:480px; margin-bottom:10px;}
  .vol-arrow{
    width:48px; height:48px; flex:0 0 auto; border-radius:50%; border:1px solid var(--line);
    background:var(--card); font-size:22px; color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .vol-arrow:disabled{opacity:.3; cursor:default;}
  .vol-label-btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    font-size:16px; font-weight:800; cursor:pointer; padding:10px 14px;
    border-radius:12px; background:var(--card); border:1px solid var(--line);
  }
  .vol-label-btn .chev{font-size:13px; color:var(--muted);}
  .tabbar-row{
    display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden;
    font-size:13px; font-weight:700; margin-bottom:16px; width:100%; max-width:480px;
  }
  .tabbar-tab{
    flex:1; text-align:center; padding:9px 4px; cursor:pointer; color:var(--muted); background:var(--card);
  }
  .tabbar-tab.active{background:var(--accent); color:var(--accent-text);}
  .tabbar-tab.disabled{opacity:.4; cursor:default;}

  .panel{width:100%; max-width:480px;}
  .empty-note{text-align:center; color:var(--muted); font-size:14px; padding:60px 20px;}

  /* ===== 카드 학습 ===== */
  .card-wrap{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .flashcard{
    width:100%; height:280px; background:var(--card); border-radius:20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; border:1px solid var(--line); padding:22px; text-align:center;
  }
  .hanja-big{font-size:78px; font-weight:500; color:var(--ink); margin-bottom:10px;}
  .word-big{font-size:27px; font-weight:800;}
  .reading{color:var(--muted); font-size:15px; margin-top:8px;}
  .definition{font-size:16px; margin-top:14px; line-height:1.55;}
  .related{margin-top:16px; font-size:13px; color:var(--muted);}
  .hint{font-size:13px; color:var(--muted); margin-top:12px;}
  .nav-row{display:flex; gap:10px; width:100%;}
  .btn{
    flex:1; padding:14px; border-radius:14px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); font-size:16px; font-weight:700; cursor:pointer; min-height:50px;
  }
  .btn.primary{background:var(--accent); color:var(--accent-text); border:none;}
  .progress{font-size:13px; color:var(--muted);}
  .toggle-row{display:flex; gap:10px; width:100%;}
  .toggle-btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:11px; border-radius:12px; border:1px solid var(--line); background:var(--card);
    color:var(--muted); font-size:13px; font-weight:700; cursor:pointer;
  }
  .toggle-btn.active.known{color:var(--good); border-color:var(--good); background:var(--good-bg);}
  .toggle-btn.active.star{color:var(--star); border-color:var(--star); background:color-mix(in srgb, var(--star) 15%, transparent);}
  .hidden-link{font-size:12px; color:var(--muted); text-decoration:underline; text-underline-offset:3px; cursor:pointer; margin-top:2px;}

  /* ===== 퀴즈 ===== */
  .quiz-progress{font-size:13px; color:var(--muted); margin-bottom:10px;}
  .quiz-label{font-size:12px; font-weight:700; color:var(--accent); letter-spacing:.5px; margin-bottom:8px;}
  .quiz-stem{
    background:var(--card); border-radius:16px; padding:20px;
    border:1px solid var(--line); border-left:4px solid var(--accent);
    margin-bottom:20px;
  }
  .quiz-stem-text{font-size:17px; line-height:1.6;}
  .option{
    width:100%; text-align:left; padding:14px 16px; margin-bottom:10px; min-height:50px;
    border-radius:14px; background:var(--card); color:var(--ink);
    border:1px solid var(--line); font-size:15px; cursor:pointer;
    display:flex; align-items:center; gap:12px;
  }
  .option-badge{
    flex:0 0 auto; width:27px; height:27px; border-radius:50%; background:var(--line);
    color:var(--muted); font-size:13px; font-weight:700; display:flex;
    align-items:center; justify-content:center;
  }
  .option-text{flex:1;}
  .option.correct{background:var(--good-bg); border-color:var(--good);}
  .option.correct .option-badge{background:var(--good); color:#fff;}
  .option.wrong{background:var(--bad-bg); border-color:var(--bad);}
  .option.wrong .option-badge{background:var(--bad); color:#fff;}
  .option:disabled{cursor:default;}
  .hanja-inline{color:var(--accent); font-weight:700;}
  .result-banner{
    text-align:center; margin-top:26px; background:var(--card); border-radius:18px;
    padding:32px 20px; border:1px solid var(--line);
  }
  .result-score{font-size:42px; font-weight:800; color:var(--accent); margin-bottom:8px;}

  /* ===== 오버레이(권 목록 / 숨긴 카드) ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex;
    align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.hidden{display:none;}
  .sheet{
    background:var(--card); border-radius:20px; padding:20px; width:100%; max-width:420px;
    max-height:70vh; overflow-y:auto;
  }
  .sheet h2{font-size:16px; margin:0 0 14px; color:var(--ink);}
  .vol-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px;}
  .vol-btn{
    padding:10px 0; border-radius:10px; border:1px solid var(--line); background:var(--bg);
    font-size:14px; font-weight:700; cursor:pointer; color:var(--ink);
  }
  .vol-btn.current{background:var(--accent); color:var(--accent-text); border-color:var(--accent);}
  .hidden-card-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 4px; border-bottom:1px solid var(--line);
  }
  .hidden-card-row:last-child{border-bottom:none;}
  .hidden-card-word{font-weight:700;}
  .hidden-card-hanja{color:var(--muted); font-size:13px; margin-left:6px;}
  .restore-btn{
    font-size:12px; font-weight:700; color:var(--accent); border:1px solid var(--accent);
    background:none; border-radius:8px; padding:6px 10px; cursor:pointer;
  }

  .backup-row{display:flex; gap:10px; margin-top:16px; width:100%; max-width:480px;}

  /* ===== 필터 행(카드 학습 전체/즐겨찾기, 5급 전체/쓰기/읽기/즐겨찾기) ===== */
  .filter-row{display:flex; gap:8px; width:100%; max-width:480px; margin-bottom:14px;}
  .filter-btn{
    flex:1; padding:10px; border-radius:10px; border:1px solid var(--line); background:var(--card);
    color:var(--muted); font-size:13px; font-weight:700; cursor:pointer;
  }
  .filter-btn.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent);}

  /* ===== 5급 배정한자 모듈 ===== */
  .g5-modes{display:flex; gap:10px; justify-content:center; margin-top:16px;}
  .g5-mode-badge{
    display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700;
    padding:6px 12px; border-radius:20px; border:1px solid var(--line);
  }
  .g5-dot{width:9px; height:9px; border-radius:50%; display:inline-block;}
  .g5-dot.green{background:var(--good);}
  .g5-dot.red{background:var(--bad);}

  /* ===== 5급 기출 독음 쓰기 ===== */
  .g5exam-prompt{font-size:56px; font-weight:500; text-align:center; padding:10px 0;}
  .write-input{
    width:100%; padding:14px 16px; border-radius:14px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-size:20px; text-align:center;
    margin-bottom:10px;
  }
  .write-input:disabled{opacity:.7;}
</style>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="한자 학습">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="화면 테마 전환">🌙</button>

<!-- ===== 진입(표지) 화면 ===== -->
<div class="screen" id="screen-entry">
  <div class="cover-glyph">漢字學習</div>
  <div class="cover-title">한자 학습</div>
  <div class="cover-tagline">매일 조금씩, 한자와 친해지기</div>

  <button class="module-card" id="pickMhj">
    <div class="module-card-title">마법천자문</div>
    <div class="cover-progress-row"><span>배운 한자</span><span id="coverProgressText">0 / 560</span></div>
    <div class="cover-progress-track"><div class="cover-progress-fill" id="coverProgressFill" style="width:0%"></div></div>
    <div class="module-card-cta" id="mhjContinueText">이어하기 · 33권</div>
  </button>
  <div class="btn-continue-sub" id="chooseVolLink">다른 권 고르기</div>

  <button class="module-card module-card-g5" id="pickG5">
    <div class="module-card-title">5급 배정한자</div>
    <div class="module-card-sub">500자 · 읽기·쓰기 학습</div>
    <div class="cover-progress-row"><span>학습 완료</span><span id="g5ProgressText">0 / 500</span></div>
    <div class="cover-progress-track"><div class="cover-progress-fill" id="g5ProgressFill" style="width:0%"></div></div>
    <div class="module-card-cta" id="g5ContinueText">시작하기</div>
  </button>
</div>

<!-- ===== 학습 화면 ===== -->
<div class="screen hidden" id="screen-study">
  <div class="back-link" id="backLink">‹ 표지</div>

  <div class="vol-nav" id="volNav">
    <button class="vol-arrow" id="volPrev">‹</button>
    <div class="vol-label-btn" id="volLabel"><span id="volLabelText">33권 한자 학습</span><span class="chev">⌄</span></div>
    <button class="vol-arrow" id="volNext">›</button>
  </div>

  <div class="tabbar-row" id="tabbarRow">
    <div class="tabbar-tab active" data-tab="card" id="tabCard">카드 <span id="cardTabProgress"></span></div>
    <div class="tabbar-tab" data-tab="quiz" id="tabQuiz">퀴즈</div>
  </div>

  <!-- 카드 학습 -->
  <div class="panel" id="panel-card">
    <div class="filter-row" id="cardFilterRow">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="starred">★ 즐겨찾기만</button>
    </div>
    <div class="card-wrap" id="cardWrap">
      <div class="flashcard" id="flashcard"></div>
      <div class="toggle-row">
        <button class="toggle-btn known" id="knownBtn">✓ 이미 알아요</button>
        <button class="toggle-btn star" id="starBtn">★ 즐겨찾기</button>
      </div>
      <div class="nav-row">
        <button class="btn" id="prevCard">이전</button>
        <button class="btn primary" id="nextCard">다음</button>
      </div>
      <div class="hidden-link hidden" id="hiddenLink">숨긴 카드 <span id="hiddenCount">0</span>개 다시 보기</div>
    </div>
    <div class="empty-note hidden" id="cardEmptyNote">이 책은 퀴즈만 있어요</div>
  </div>

  <!-- 퀴즈 -->
  <div class="panel hidden" id="panel-quiz">
    <div id="quizWrap">
      <div class="quiz-progress" id="quizProgress"></div>
      <div class="quiz-stem" id="quizStemWrap">
        <div class="quiz-label">문제</div>
        <div class="quiz-stem-text" id="quizStem"></div>
      </div>
      <div id="quizOptions"></div>
      <div id="quizResult"></div>
    </div>
    <div class="empty-note hidden" id="quizEmptyNote">이 책은 카드만 있어요</div>
  </div>

  <!-- 5급 배정한자 -->
  <div class="panel hidden" id="panel-g5">
    <div class="tabbar-row" id="g5TabbarRow">
      <div class="tabbar-tab active" data-g5tab="study">글자 학습</div>
      <div class="tabbar-tab" data-g5tab="exam">기출문제</div>
    </div>

    <div id="g5-sub-study">
      <div class="filter-row" id="g5FilterRow">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="starred">★ 즐겨찾기</button>
      </div>
      <div class="card-wrap">
        <div class="flashcard" id="g5Flashcard"></div>
        <div class="toggle-row">
          <button class="toggle-btn known" id="g5KnownBtn">✓ 이미 알아요</button>
          <button class="toggle-btn star" id="g5StarBtn">★ 즐겨찾기</button>
        </div>
        <button class="btn primary" id="g5NextBtn" style="width:100%;">다음</button>
        <div class="hidden-link hidden" id="g5HiddenLink">숨긴 한자 <span id="g5HiddenCount">0</span>개 다시 보기</div>
      </div>
    </div>

    <div id="g5-sub-exam" class="hidden">
      <div class="vol-label-btn" id="g5examPickBtn" style="width:100%; margin-bottom:14px;">
        <span id="g5examSetLabel">회차·세트 고르기</span><span class="chev">⌄</span>
      </div>

      <div id="g5examQuizArea" class="hidden">
        <div class="quiz-progress" id="g5examProgress"></div>
        <div class="quiz-stem" id="g5examStemWrap">
          <div class="quiz-label">한자어를 보고 독음(읽는 법)을 쓰세요</div>
          <div class="g5exam-prompt" id="g5examPrompt"></div>
        </div>
        <input type="text" id="g5examInput" class="write-input" placeholder="여기에 입력하세요">
        <button class="btn primary" id="g5examSubmitBtn" style="width:100%;">확인</button>
        <div id="g5examResult"></div>
      </div>
      <div class="empty-note" id="g5examEmptyNote">회차와 세트를 고르면 문제가 시작돼요</div>
    </div>
  </div>
</div>

<!-- 5급 기출 회차 선택 -->
<div class="overlay hidden" id="g5examExamOverlay">
  <div class="sheet">
    <h2>회차 선택</h2>
    <div class="vol-grid" id="g5examExamGrid"></div>
  </div>
</div>

<!-- 5급 기출 세트(부) 선택 -->
<div class="overlay hidden" id="g5examPartOverlay">
  <div class="sheet">
    <h2 id="g5examPartTitle">세트 선택</h2>
    <div class="vol-grid" id="g5examPartGrid"></div>
  </div>
</div>

<!-- 권 목록 -->
<div class="overlay hidden" id="volOverlay">
  <div class="sheet">
    <h2>권 선택</h2>
    <div class="vol-grid" id="volGrid"></div>
  </div>
</div>

<!-- 숨긴 카드 목록 -->
<div class="overlay hidden" id="hiddenOverlay">
  <div class="sheet">
    <h2 id="hiddenTitle">숨긴 카드</h2>
    <div id="hiddenList"></div>
  </div>
</div>

<div class="backup-row hidden" id="backupRow">
  <button class="btn" id="exportBtn">내보내기</button>
  <button class="btn" id="importBtn">가져오기</button>

<script>
/* =========================================================
   마법천자문 한자 학습 — 원본 hanja_app_v60.html 구조를 따르되,
   진입(표지) 화면 + 다권(33~63) 지원 + 실제 동작하는 암기완료/즐겨찾기를 더함.
   ========================================================= */

const CARD_VOLUMES = Array.from({length: 28}, (_, i) => 33 + i); // 33~60 (카드 있는 권)
const APP_VOLUMES = Array.from({length: 31}, (_, i) => 33 + i);  // 33~63 (앱 전체 범위)
const TOTAL_CARDS = CARD_VOLUMES.length * 20; // 560
const STORAGE_KEY = 'mhj-progress-v2';
const CIRCLE_NUM = ['①','②','③','④','⑤'];

const GRADE5_ID = 'g5';
const TOTAL_G5 = 500;
const NAV_LIST = APP_VOLUMES; // 권 이동(화살표/권 선택 시트)이 도는 마법천자문 권 목록

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {version:2, currentVolume:APP_VOLUMES[0], words:{}, lastScores:{}};
}
let PROGRESS = loadProgress();
function saveProgress(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(PROGRESS)); }

function wordState(id){
  if(!PROGRESS.words[id]) PROGRESS.words[id] = {starred:false, known:false, wrongCount:0};
  return PROGRESS.words[id];
}

function countKnownTotal(){
  let n = 0;
  for(const id in PROGRESS.words){
    if(/^\d{3}-\d+$/.test(id) && PROGRESS.words[id].known) n++;
  }
  return n;
}

function countG5KnownTotal(){
  let n = 0;
  for(const id in PROGRESS.words){
    if(id.startsWith('grade5-') && PROGRESS.words[id].known) n++;
  }
  return n;
}

const volumeCache = {};
async function loadVolume(vol){
  if(volumeCache[vol]) return volumeCache[vol];
  let data;
  // 독립 실행형 빌드(scripts/build_standalone.py)는 이 스크립트 태그 앞에
  // window.EMBEDDED_DATA를 주입해 서버 없이 file://로도 동작하게 한다.
  if(typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA[vol]){
    data = EMBEDDED_DATA[vol];
  } else {
    const res = await fetch(`data/volume${String(vol).padStart(2,'0')}.json`);
    data = await res.json();
  }
  volumeCache[vol] = data;
  return data;
}

let GRADE5_ENTRIES = null;
async function loadGrade5(){
  if(GRADE5_ENTRIES) return GRADE5_ENTRIES;
  let data;
  if(typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA[GRADE5_ID]){
    data = EMBEDDED_DATA[GRADE5_ID];
  } else {
    const res = await fetch('data/grade5.json');
    data = await res.json();
  }
  GRADE5_ENTRIES = data.entries;
  return GRADE5_ENTRIES;
}

let GRADE5_EXAM_ITEMS = null;
async function loadGrade5Exam(){
  if(GRADE5_EXAM_ITEMS) return GRADE5_EXAM_ITEMS;
  let data;
  if(typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA['g5exam']){
    data = EMBEDDED_DATA['g5exam'];
  } else {
    const res = await fetch('data/grade5-exam-write.json');
    data = await res.json();
  }
  GRADE5_EXAM_ITEMS = data.items;
  return GRADE5_EXAM_ITEMS;
}

/* ---------- 5급 배정한자 (Fisher-Yates 무반복 덱) ---------- */
function fisherYates(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function g5FilteredIds(filter){
  let list = GRADE5_ENTRIES.filter(e => !wordState(e.id).known);
  if(filter === 'starred') list = list.filter(e => wordState(e.id).starred);
  return list.map(e => e.id);
}

function g5NewDeck(filter, avoidFirstId){
  const deck = fisherYates(g5FilteredIds(filter));
  if(deck.length > 1 && avoidFirstId && deck[0] === avoidFirstId){
    [deck[0], deck[1]] = [deck[1], deck[0]];
  }
  return deck;
}

function g5State(){
  if(!PROGRESS.g5) PROGRESS.g5 = {filter: 'all', deck: [], pos: 0, lastId: null};
  return PROGRESS.g5;
}

function g5EnsureDeck(){
  const st = g5State();
  if(!st.deck.length || st.pos >= st.deck.length){
    st.deck = g5NewDeck(st.filter, st.lastId);
    st.pos = 0;
    saveProgress();
  }
}

function g5SetFilter(filter){
  const st = g5State();
  st.filter = filter;
  st.deck = g5NewDeck(filter, st.lastId);
  st.pos = 0;
  saveProgress();
  g5RenderCard();
}

function g5UpdateHiddenLink(){
  const hiddenCount = GRADE5_ENTRIES.filter(e => wordState(e.id).known).length;
  document.getElementById('g5HiddenCount').textContent = hiddenCount;
  document.getElementById('g5HiddenLink').classList.toggle('hidden', hiddenCount===0);
}

function g5RenderCard(){
  g5EnsureDeck();
  const st = g5State();
  document.querySelectorAll('#g5FilterRow .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === st.filter));
  g5UpdateHiddenLink();
  const entry = GRADE5_ENTRIES.find(e => e.id === st.deck[st.pos]);
  const flashcard = document.getElementById('g5Flashcard');
  const toggleRow = document.querySelector('#panel-g5 .toggle-row');
  const nextBtn = document.getElementById('g5NextBtn');
  if(!entry){
    toggleRow.classList.add('hidden');
    nextBtn.classList.add('hidden');
    const msg = st.filter === 'starred' ? '즐겨찾기한 한자가 없어요' : '5급 배정한자를 모두 암기 완료했어요!';
    flashcard.innerHTML = `<div class="hint">${msg}</div>`;
    return;
  }
  toggleRow.classList.remove('hidden');
  nextBtn.classList.remove('hidden');
  st.lastId = entry.id;
  saveProgress();
  const w = wordState(entry.id);
  document.getElementById('g5StarBtn').classList.toggle('active', w.starred);
  const modesHtml = entry.study_modes.map(m => {
    const color = m === 'write' ? 'red' : 'green';
    const label = m === 'write' ? '쓰기' : '읽기';
    return `<span class="g5-mode-badge"><span class="g5-dot ${color}"></span>${label}</span>`;
  }).join('');
  flashcard.innerHTML = `
    <div class="hanja-big">${entry.hanja}</div>
    <div class="reading">${entry.reading_meaning}</div>
    <div class="g5-modes">${modesHtml}</div>
    <div class="hint">${st.pos + 1} / ${st.deck.length}</div>
  `;
}

/* ---------- 5급 기출 '한자→독음 쓰기' ---------- */
const G5EXAM_PARTS = [[1, 9], [10, 18], [19, 27], [28, 35]]; // 회차당 35문항을 9문항 내외 4세트로 분할

let g5examItems = []; // 현재 고른 회차·세트의 문항만
let g5examOrder = [];
let g5examIdx = 0;
let g5examScore = 0;
let g5examAnswered = false;
let g5examSetKey = null; // "g5exam-{회차}-{세트index}" — 오답 우선 재출제 키
let g5examExamList = null; // 전체 회차 번호 목록(캐시)

function normalizeAnswer(s){
  return String(s).replace(/\s+/g, '').trim();
}

function g5examBuildOrder(){
  const idxs = g5examItems.map((_, i) => i);
  const wrongSet = new Set(PROGRESS.words[g5examSetKey]?.wrongIds || []);
  const shuffled = fisherYates(idxs);
  shuffled.sort((a, b) => {
    const aw = wrongSet.has(g5examItems[a].id) ? 0 : 1;
    const bw = wrongSet.has(g5examItems[b].id) ? 0 : 1;
    return aw - bw;
  });
  return shuffled;
}

function g5examRecordWrong(itemId, wasWrong){
  const key = g5examSetKey;
  if(!PROGRESS.words[key]) PROGRESS.words[key] = {starred: false, known: false, wrongCount: 0, wrongIds: []};
  const rec = PROGRESS.words[key];
  if(!rec.wrongIds) rec.wrongIds = [];
  const has = rec.wrongIds.includes(itemId);
  if(wasWrong && !has) rec.wrongIds.push(itemId);
  if(!wasWrong && has) rec.wrongIds = rec.wrongIds.filter(x => x !== itemId);
}

function startG5ExamSet(examNumber, partIdx){
  const [lo, hi] = G5EXAM_PARTS[partIdx];
  g5examItems = GRADE5_EXAM_ITEMS.filter(it => it.exam_number === examNumber && it.question_number >= lo && it.question_number <= hi);
  g5examSetKey = `g5exam-${examNumber}-${partIdx}`;
  document.getElementById('g5examSetLabel').textContent = `${examNumber}회 ${partIdx + 1}부`;
  document.getElementById('g5examEmptyNote').classList.add('hidden');
  document.getElementById('g5examQuizArea').classList.remove('hidden');
  g5examOrder = g5examBuildOrder();
  g5examIdx = 0; g5examScore = 0; g5examAnswered = false;
  g5examRenderQuestion();
}

function g5examRenderQuestion(){
  const stemWrap = document.getElementById('g5examStemWrap');
  const input = document.getElementById('g5examInput');
  const submitBtn = document.getElementById('g5examSubmitBtn');
  const resultEl = document.getElementById('g5examResult');
  resultEl.innerHTML = '';

  if(g5examIdx >= g5examOrder.length){
    document.getElementById('g5examProgress').textContent = '';
    stemWrap.classList.add('hidden');
    input.classList.add('hidden');
    submitBtn.classList.add('hidden');
    resultEl.innerHTML = `
      <div class="result-banner">
        <div class="result-score">${g5examScore} / ${g5examOrder.length}</div>
        <div>수고했어요! 다시 풀어볼까요?</div>
        <div class="nav-row" style="margin-top:16px;">
          <button class="btn primary" id="g5examRetryBtn">다시 풀기</button>
        </div>
      </div>`;
    document.getElementById('g5examRetryBtn').addEventListener('click', ()=>{
      g5examOrder = g5examBuildOrder();
      g5examIdx = 0; g5examScore = 0; g5examAnswered = false;
      stemWrap.classList.remove('hidden');
      input.classList.remove('hidden');
      submitBtn.classList.remove('hidden');
      g5examRenderQuestion();
    });
    return;
  }

  stemWrap.classList.remove('hidden');
  input.classList.remove('hidden');
  submitBtn.classList.remove('hidden');
  submitBtn.textContent = '확인';
  input.value = '';
  input.disabled = false;
  g5examAnswered = false;
  const item = g5examItems[g5examOrder[g5examIdx]];
  document.getElementById('g5examProgress').textContent = `${g5examIdx + 1} / ${g5examOrder.length}   ·   맞은 개수 ${g5examScore}`;
  document.getElementById('g5examPrompt').textContent = item.prompt;
  input.focus();
}

function g5examCheck(){
  if(g5examAnswered || g5examIdx >= g5examOrder.length) return;
  const item = g5examItems[g5examOrder[g5examIdx]];
  const input = document.getElementById('g5examInput');
  const userAns = normalizeAnswer(input.value);
  const correct = item.expected_answers.some(a => normalizeAnswer(a) === userAns);
  g5examAnswered = true;
  input.disabled = true;
  if(correct) g5examScore++;
  g5examRecordWrong(item.id, !correct);
  saveProgress();

  document.getElementById('g5examResult').innerHTML = `
    <div class="result-banner" style="padding:20px;">
      <div style="font-size:17px; font-weight:800; color:${correct ? 'var(--good)' : 'var(--bad)'};">
        ${correct ? '정답이에요!' : '아쉬워요'}
      </div>
      ${!correct ? `<div style="margin-top:8px;">정답: ${item.expected_answers[0]}</div>` : ''}
      <button class="btn primary" id="g5examNextBtn" style="width:100%; margin-top:14px;">다음</button>
    </div>`;
  document.getElementById('g5examNextBtn').addEventListener('click', ()=>{
    g5examIdx++;
    g5examRenderQuestion();
  });
}

document.getElementById('g5examSubmitBtn').addEventListener('click', g5examCheck);
document.getElementById('g5examInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') g5examCheck();
});

async function loadAndRender(expectedToken){
  const vol = currentVol;
  const data = await loadVolume(vol);
  // 이 요청이 대기하는 동안 더 최신 gotoVolume 호출이 있었다면 이 결과는 버린다
  if(expectedToken !== undefined && expectedToken !== navToken) return;
  DATA = data;
  const hasQuiz = DATA.quiz && DATA.quiz.length > 0;

  studyCards = buildStudyDeck();
  const hasCards = studyCards.length > 0;
  const hasAnyCards = DATA.cards && DATA.cards.length > 0;

  const tabCard = document.getElementById('tabCard');
  const tabQuiz = document.getElementById('tabQuiz');
  tabCard.classList.toggle('disabled', !hasAnyCards);
  tabQuiz.classList.toggle('disabled', !hasQuiz);
  document.getElementById('cardTabProgress').textContent = hasAnyCards ? `${studyCards.length}` : '';
  document.getElementById('quizWrap').classList.toggle('hidden', !hasQuiz);
  document.getElementById('quizEmptyNote').classList.toggle('hidden', hasQuiz);

  if(!hasAnyCards && hasQuiz){
    activateTab('quiz');
  } else {
    activateTab('card');
  }

  cardIdx = 0; flipped = false;
  document.querySelectorAll('#cardFilterRow .filter-btn').forEach(b=>b.classList.toggle('active', b.dataset.filter===cardFilter));
  renderCardPanel();

  quizIdx = 0; score = 0; answered = false;
  quizOrder = buildQuizOrder();
  if(hasQuiz) renderQuiz();
}

  list.innerHTML = hidden.map(c => `
    <div class="hidden-card-row" data-id="${c.id}">
      <div><span class="hidden-card-word">${c.word}</span><span class="hidden-card-hanja">${c.hanja}</span></div>
      <button class="restore-btn" data-id="${c.id}">다시 보기</button>
    </div>`).join('');
  list.querySelectorAll('.restore-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const w = wordState(btn.dataset.id);
      w.known = false;
      saveProgress();
      document.getElementById('hiddenOverlay').classList.add('hidden');
      loadAndRender();
    });
  });
  document.getElementById('hiddenOverlay').classList.remove('hidden');
});
document.getElementById('hiddenOverlay').addEventListener('click', e=>{
  if(e.target.id === 'hiddenOverlay') e.target.classList.add('hidden');
});

/* ---------- 카드 학습 ---------- */
let cardIdx = 0;
let flipped = false;

function renderCard(){
  if(studyCards.length === 0) return;
  const c = studyCards[cardIdx];
  const el = document.getElementById('flashcard');

  const w = wordState(c.id);
  document.getElementById('starBtn').classList.toggle('active', w.starred);
  document.getElementById('starBtn').classList.toggle('star', true);
  document.getElementById('knownBtn').classList.toggle('active', w.known);

  if(!flipped){
    el.innerHTML = `
      <div class="hanja-big">${c.hanja}</div>
      <div class="hint">${cardIdx+1} / ${studyCards.length} · 탭하면 뜻을 확인해요</div>
    `;
  } else {
    const related = (c.related||[]).map(r => `${r.word}(${r.hanja})${r.relation==='antonym' ? ' · 반의어':''}`).join(' &nbsp;·&nbsp; ');
    el.innerHTML = `
      <div class="word-big">${c.word}</div>
      <div class="reading">${c.reading}</div>
      <div class="definition">${c.definition}</div>
      ${related ? `<div class="related">${related}</div>` : ''}
    `;
  }
}
document.getElementById('flashcard').addEventListener('click', ()=>{
  flipped = !flipped;
  renderCard();
});
document.getElementById('starBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  const w = wordState(studyCards[cardIdx].id);
  w.starred = !w.starred;
  saveProgress();
  // 즐겨찾기만 보기 필터 중 별표를 해제하면 그 카드는 즉시 목록에서 빠진다
  if(cardFilter === 'starred' && !w.starred){
    studyCards.splice(cardIdx, 1);
    if(cardIdx >= studyCards.length) cardIdx = Math.max(0, studyCards.length - 1);
    flipped = false;
    renderCardPanel();
  } else {
    renderCard();
  }
});
document.getElementById('knownBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  const id = studyCards[cardIdx].id;
  const w = wordState(id);
  w.known = true;
  saveProgress();
  // 암기완료 처리한 카드는 즉시 학습 순서에서 빠진다
  studyCards.splice(cardIdx, 1);
  if(cardIdx >= studyCards.length) cardIdx = Math.max(0, studyCards.length - 1);
  flipped = false;
  renderCardPanel();
});
document.getElementById('prevCard').addEventListener('click', ()=>{
  if(!studyCards.length) return;
  cardIdx = (cardIdx - 1 + studyCards.length) % studyCards.length;
  flipped = false;
  renderCard();
});
document.getElementById('nextCard').addEventListener('click', ()=>{
  if(!studyCards.length) return;
  cardIdx = (cardIdx + 1) % studyCards.length;
  flipped = false;
  renderCard();
});

/* ---------- 객관식 퀴즈 ---------- */
let quizOrder = [];
let quizIdx = 0;
let score = 0;
let answered = false;

// 화면엔 드러내지 않고, 이 책에서 전에 틀렸던 문제를 앞쪽으로 보내기만 한다.
function buildQuizOrder(){
  if(!DATA.quiz) return [];
  const idxs = DATA.quiz.map((_,i)=>i);
  const wrongKey = `q-${currentVol}`;
  const wrongSet = new Set(PROGRESS.words[wrongKey]?.wrongIds || []);
  idxs.sort((a,b)=>{
    const aw = wrongSet.has(DATA.quiz[a].id) ? 0 : 1;
    const bw = wrongSet.has(DATA.quiz[b].id) ? 0 : 1;
    return aw - bw;
  });
  return idxs;
}

function renderQuiz(){
  const stemWrap = document.getElementById('quizStemWrap');
  const stemEl = document.getElementById('quizStem');
  const optEl = document.getElementById('quizOptions');
  const resultEl = document.getElementById('quizResult');
  resultEl.innerHTML = '';

  if(quizIdx >= quizOrder.length){
    document.getElementById('quizProgress').textContent = '';
    stemWrap.classList.add('hidden');
    optEl.innerHTML = '';

    PROGRESS.lastScores[currentVol] = {score, total: quizOrder.length};
    saveProgress();

    resultEl.innerHTML = `
      <div class="result-banner">
        <div class="result-score">${score} / ${quizOrder.length}</div>
        <div>수고했어요! 다시 풀어볼까요?</div>
        <div class="nav-row" style="margin-top:16px;">
          <button class="btn primary" id="retryQuiz">다시 풀기</button>
        </div>
      </div>`;
    document.getElementById('retryQuiz').addEventListener('click', ()=>{
      quizOrder = buildQuizOrder();
      quizIdx = 0; score = 0; answered = false;
      stemWrap.classList.remove('hidden');
      renderQuiz();
    });
    return;
  }

  stemWrap.classList.remove('hidden');
  const q = DATA.quiz[quizOrder[quizIdx]];
  answered = false;
  document.getElementById('quizProgress').textContent = `${quizIdx+1} / ${quizOrder.length}   ·   맞은 개수 ${score}`;
  stemEl.innerHTML = highlightHanja(q.stem);
  optEl.innerHTML = '';

  q.options.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option';
    const badgeLabel = q.type === 'ox' ? opt : CIRCLE_NUM[i];
    btn.innerHTML = `<span class="option-badge">${badgeLabel}</span><span class="option-text">${highlightHanja(opt)}</span>`;
    btn.addEventListener('click', ()=> selectAnswer(i, q, optEl));
    optEl.appendChild(btn);
  });
}

function recordWrong(quizId, wasWrong){
  const key = `q-${currentVol}`;
  if(!PROGRESS.words[key]) PROGRESS.words[key] = {starred:false, known:false, wrongCount:0, wrongIds:[]};
  const rec = PROGRESS.words[key];
  if(!rec.wrongIds) rec.wrongIds = [];
  const has = rec.wrongIds.includes(quizId);
  if(wasWrong && !has) rec.wrongIds.push(quizId);
  if(!wasWrong && has) rec.wrongIds = rec.wrongIds.filter(x=>x!==quizId);
}

function selectAnswer(i, q, optEl){
  if(answered) return;
  answered = true;
  const buttons = optEl.querySelectorAll('.option');
  buttons.forEach((b, idx)=>{
    b.disabled = true;
    if(idx === q.answer_index) b.classList.add('correct');
    else if(idx === i) b.classList.add('wrong');
  });
  const correct = (i === q.answer_index);
  if(correct) score++;
  recordWrong(q.id, !correct);
  saveProgress();
  setTimeout(()=>{
    quizIdx++;
    renderQuiz();
  }, 700);
}

/* ---------- 부모용 백업 (?backup 접속시만 노출) ---------- */
if(new URLSearchParams(location.search).has('backup')){
  document.getElementById('backupRow').classList.remove('hidden');
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(PROGRESS, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `mhj-progress-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('importBtn').addEventListener('click', ()=>{
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        PROGRESS = JSON.parse(reader.result);
        saveProgress();
        alert('가져오기 완료!');
        location.reload();
      }catch(err){ alert('파일을 읽을 수 없어요.'); }
    };
    reader.readAsText(file);
  });
}

/* ---------- 다크/라이트 테마 전환 ---------- */
const THEME_KEY = 'mhj-theme-v1';
function getStoredTheme(){
  try{ return localStorage.getItem(THEME_KEY); }catch(e){ return null; }
}
function setTheme(theme){ // theme: 'light' | 'dark' | null(자동)
  try{
    if(theme) localStorage.setItem(THEME_KEY, theme);
    else localStorage.removeItem(THEME_KEY);
  }catch(e){}
  document.documentElement.classList.toggle('theme-light', theme === 'light');
  document.documentElement.classList.toggle('theme-dark', theme === 'dark');
  const effective = theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = effective === 'dark' ? '☀️' : '🌙';
}
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const stored = getStoredTheme();
  const effective = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  setTheme(effective === 'dark' ? 'light' : 'dark');
});
setTheme(getStoredTheme());
